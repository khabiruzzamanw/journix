<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />

    <title>Diary</title>
  </head>

  <body>
    <header>
      <nav>
        <ul>
          <li class=""><a href="#" class="">Home</a></li>
          <li class=""><a href="#" class="">New</a></li>
          <li class=""><a href="#" class="">Saved</a></li>
          <li class="">
            <span>
              <input
                type="search"
                name=""
                id=""
                class="searchBar"
                placeholder="Search"
              />
            </span>
            <span>
              <svg
                id="search"
                class="search-icon"
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="icon icon-tabler icons-tabler-outline icon-tabler-search"
              >
                <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                <path d="M10 10m-7 0a7 7 0 1 0 14 0a7 7 0 1 0 -14 0" />
                <path d="M21 21l-6 -6" />
              </svg>
            </span>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <section class="inputContainer">
        <div class="inputItem">
          <input
            type="text"
            id="headingInput"
            class="headingInput"
            placeholder="Write your Note heading"
          />
          <textarea
            name=""
            id="inputText"
            class="textZone"
            placeholder="Your Journal context"
          ></textarea>
          <button id="getText" class="addButton">Add</button>
        </div>
      </section>
      <section id="savedDiarySection">
        <h2>Saved Diaries</h2>
      </section>
    </main>
  </body>
  <script src="./app.js"></script>
</html>
